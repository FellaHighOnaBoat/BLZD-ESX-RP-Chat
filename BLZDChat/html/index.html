<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="chat-container" class="chat-container">
        <div class="channel-tabs" id="channelTabs"></div>

        <div class="messages-wrapper">
            <div class="messages" id="messages"></div>
            <div class="scroll-indicator" id="scrollIndicator" style="display:none;">
                <span>⬇ New messages</span>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <div class="active-channel-indicator" id="activeChannelIndicator">
                    <span class="channel-dot" id="channelDot"></span>
                    <span id="channelLabel">Global</span>
                </div>
                <input
                    type="text"
                    id="chatInput"
                    placeholder="Type a message..."
                    maxlength="256"
                    autocomplete="off"
                    spellcheck="false"
                />
                <div class="input-actions">
                    <span class="char-counter" id="charCounter">0/256</span>
                    <button class="emoji-btn" id="emojiBtn" title="Emojis">😀</button>
                    <button class="send-btn" id="sendBtn" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="suggestions" id="suggestions" style="display: none;"></div>

            <div class="emoji-picker" id="emojiPicker" style="display: none;">
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
        </div>
    </div>

    <audio id="notifSound" preload="auto">
        <source src="sounds/notif.ogg" type="audio/ogg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
